name: Benchmarking

on:
  pull_request:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.11'
      - uses: julia-actions/cache@v3

      # Run base branch benchmarks
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.base_ref }}
      - name: Benchmark base branch
        id: benchmark-base
        working-directory: ./benchmarks
        run: |
          julia --project=. -e 'using Pkg; Pkg.instantiate()'
          results=$(julia --project=. benchmarks.jl json | tail -n 1 || true)
          echo "$results"
          echo "results=$results" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # Run head branch benchmarks on the same runner
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          clean: false
      - name: Benchmark PR head
        id: benchmark-head
        working-directory: ./benchmarks
        run: |
          julia --project=. -e 'using Pkg; Pkg.instantiate()'
          results=$(julia --project=. benchmarks.jl json | tail -n 1 || true)
          echo "$results"
          echo "results=$results" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # Combine results and post comment
      - name: Combine benchmark results
        working-directory: ./benchmarks
        run: |
          version_info=$(julia -e 'using InteractiveUtils; versioninfo()')
          echo "$version_info"
          echo "VERSION_INFO<<EOF" >> $GITHUB_ENV
          echo "$version_info" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          echo '${{ steps.benchmark-base.outputs.results }}' > base.json
          echo '${{ steps.benchmark-head.outputs.results }}' > head.json

          results=$(julia --project=. benchmarks.jl combine head.json base.json)
          echo "Combined results"
          echo "--------------------------------------------------------"
          echo "$results"

          echo "BENCHMARK_OUTPUT<<EOF" >> $GITHUB_ENV
          echo "$results" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Find existing benchmark comment
        uses: peter-evans/find-comment@v4
        id: find_comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]

      - name: Create or update benchmark comment
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## Benchmark Report

            - this PR's head: `${{ steps.benchmark-head.outputs.sha }}`
            - base branch: `${{ steps.benchmark-base.outputs.sha }}`

            ### Computer Information
            ```
            ${{ env.VERSION_INFO }}
            ```
            ### Benchmark Results

            ${{ env.BENCHMARK_OUTPUT }}

          comment-id: ${{ steps.find_comment.outputs.comment-id }}
          edit-mode: replace
